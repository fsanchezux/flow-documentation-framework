<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlowDocs — API Mode Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { height: 100vh; }
    #docs { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="docs"></div>

  <script src="../dist/flow-docs.min.js"></script>
  <script>
    // API mode: reads docs folder dynamically from the server
    FlowDocs.init({
      container: '#docs',
      apiUrl: '/api/docs',
      onSave: (skill, filePath, content) => {
        console.log('Saved via API:', skill, filePath)
      }
    })
  </script>
</body>
</html>
